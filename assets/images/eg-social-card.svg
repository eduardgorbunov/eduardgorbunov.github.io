  <g filter="url(#softShadow)">
    <circle cx="952" cy="315" r="164" fill="#fbf5eb" stroke="#f0dfc1" stroke-width="10"/>
    <image href="img-3924-690x1130.jpeg" x="802" y="148" width="300" height="491" preserveAspectRatio="xMidYMin slice" clip-path="url(#photoClip)"/>
