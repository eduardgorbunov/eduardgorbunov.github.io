<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Eduard Gorbunov academic website preview</title>
  <desc id="desc">A landscape preview card for Eduard Gorbunov, Assistant Professor at MBZUAI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="1" stop-color="#edf4f1"/>
    </linearGradient>
    <clipPath id="photoClip">
      <circle cx="952" cy="315" r="150"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#102333" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="#ffffff" stroke="#d9e5e2" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="10" rx="5" fill="#1b5a54"/>
  <rect x="48" y="572" width="1104" height="10" rx="5" fill="#c28a2c"/>
  <g transform="translate(112 120)">
    <text x="0" y="0" fill="#1a2333" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="68" font-weight="800">Eduard Gorbunov</text>
    <text x="0" y="72" fill="#1b5a54" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700">Assistant Professor</text>
    <text x="0" y="120" fill="#485767" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="650">Statistics and Data Science, MBZUAI</text>
    <g transform="translate(0 190)">
      <rect x="0" y="0" width="226" height="48" rx="24" fill="#eef7f5" stroke="#cbdeda"/>
      <text x="24" y="32" fill="#174f49" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="23" font-weight="800">Optimization</text>
      <rect x="246" y="0" width="238" height="48" rx="24" fill="#eff4fb" stroke="#cfdbea"/>
      <text x="270" y="32" fill="#24538d" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="23" font-weight="800">Distributed ML</text>
      <rect x="504" y="0" width="184" height="48" rx="24" fill="#fff7ea" stroke="#ead8b4"/>
      <text x="528" y="32" fill="#9b6a1f" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="23" font-weight="800">Reliability</text>
    </g>
    <text x="0" y="336" fill="#5b6876" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="600">eduardgorbunov.github.io</text>
